<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apocalypse Survivor Scan</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 80, 0, 0.25), transparent 32%),
        radial-gradient(circle at bottom, rgba(0, 255, 120, 0.13), transparent 38%),
        #050505;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      min-height: 90vh;
      border: 2px solid #66ff99;
      border-radius: 22px;
      background: rgba(8, 8, 8, 0.94);
      box-shadow: 0 0 28px rgba(102, 255, 153, 0.25);
      padding: 22px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035),
        rgba(255, 255, 255, 0.035) 1px,
        transparent 1px,
        transparent 7px
      );
      pointer-events: none;
      opacity: 0.22;
    }

    .screen {
      position: relative;
      z-index: 1;
    }

    .hidden {
      display: none;
    }

    h1 {
      margin: 0;
      text-align: center;
      color: #66ff99;
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(102, 255, 153, 0.65);
    }

    .subtitle {
      text-align: center;
      color: #cccccc;
      font-size: 1.15rem;
      margin: 14px 0 24px;
      line-height: 1.35;
    }

    .big-card {
      border: 1px solid rgba(102, 255, 153, 0.65);
      border-radius: 18px;
      padding: 20px;
      background: rgba(102, 255, 153, 0.09);
      margin: 18px 0;
      text-align: center;
    }

    .scan-label {
      color: #ffcc00;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .big-result {
      font-size: clamp(1.8rem, 7vw, 2.8rem);
      font-weight: bold;
      line-height: 1.05;
      margin-bottom: 14px;
    }

    .verdict {
      font-size: 1.25rem;
      line-height: 1.35;
      color: #eeeeee;
      margin-top: 10px;
    }

    .quick-stats {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    .quick-stat {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 1.12rem;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .quick-stat span:first-child {
      color: #bbbbbb;
    }

    .quick-stat span:last-child {
      color: #ffffff;
      font-weight: bold;
      text-align: right;
    }

    .main-button {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      border: none;
      background: #66ff99;
      color: #050505;
      font-size: 1.25rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(102, 255, 153, 0.38);
      margin-top: 12px;
    }

    .secondary-button {
      width: 100%;
      padding: 15px;
      border-radius: 16px;
      border: 1px solid #777;
      background: #151515;
      color: #f2f2f2;
      font-size: 1.05rem;
      cursor: pointer;
      margin-top: 10px;
    }

    .main-button:active,
    .secondary-button:active,
    .path-button:active {
      transform: scale(0.98);
    }

    h2 {
      text-align: center;
      color: #66ff99;
      font-size: 2rem;
      margin: 0 0 10px;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      color: #dddddd;
      font-weight: bold;
      font-size: 1.08rem;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #66ff99;
      background: #111;
      color: #fff;
      font-size: 1.2rem;
      outline: none;
    }

    .path-grid {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .path-button {
      width: 100%;
      text-align: left;
      padding: 15px;
      border-radius: 15px;
      border: 1px solid rgba(102, 255, 153, 0.55);
      background: rgba(255, 255, 255, 0.055);
      color: #f2f2f2;
      cursor: pointer;
      font-size: 1rem;
    }

    .path-button.selected {
      border-color: #ffcc00;
      box-shadow: 0 0 14px rgba(255, 204, 0, 0.3);
      background: rgba(255, 204, 0, 0.13);
    }

    .path-name {
      display: block;
      color: #ffcc00;
      font-weight: bold;
      font-size: 1.18rem;
      margin-bottom: 4px;
    }

    .path-desc {
      display: block;
      color: #cccccc;
      line-height: 1.3;
    }

    .result-card {
      display: none;
      margin-top: 18px;
      border: 1px solid rgba(255, 204, 0, 0.55);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255, 204, 0, 0.08);
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.18);
      padding: 10px 0;
      font-size: 1.05rem;
    }

    .stat span:first-child {
      color: #bbbbbb;
    }

    .stat span:last-child {
      color: #ffffff;
      text-align: right;
      font-weight: bold;
    }

    .profile-text {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(102, 255, 153, 0.1);
      border: 1px solid rgba(102, 255, 153, 0.45);
      font-size: 1.08rem;
      line-height: 1.4;
    }

    .badge {
      display: inline-block;
      margin: 6px 5px 0 0;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(102, 255, 153, 0.13);
      border: 1px solid rgba(102, 255, 153, 0.45);
      color: #dfffe8;
      font-size: 0.92rem;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .glitch {
      animation: glitch 1.4s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 #ff3333, -2px 0 #33ccff; }
      25% { text-shadow: -2px 0 #ff3333, 2px 0 #33ccff; }
      50% { text-shadow: 2px 0 #ffcc00, -2px 0 #66ff99; }
      75% { text-shadow: -1px 0 #33ccff, 1px 0 #ff3333; }
      100% { text-shadow: 2px 0 #ff3333, -2px 0 #33ccff; }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- COVER SCREEN -->
    <div id="coverScreen" class="screen">
      <h1 class="glitch">DID YOU SURVIVE?</h1>
      <p class="subtitle">Apocalypse survivor scan complete.</p>

      <div class="big-card">
        <div class="scan-label">FINAL VERDICT</div>
        <div id="coverTitle" class="big-result"></div>
        <div id="coverVerdict" class="verdict"></div>
      </div>

      <div class="quick-stats">
        <div class="quick-stat">
          <span>Bass Resistance</span>
          <span id="bassStat"></span>
        </div>
        <div class="quick-stat">
          <span>Hydration Status</span>
          <span id="hydrationStat"></span>
        </div>
        <div class="quick-stat">
          <span>Zombie Risk</span>
          <span id="zombieStat"></span>
        </div>
      </div>

      <button class="main-button" onclick="showDeepScan()">CONTINUE SCAN</button>
      <button class="secondary-button" onclick="rerollCover()">SCAN AGAIN</button>

      <p class="footer-note">No reading required. The machine has already judged you.</p>
    </div>

    <!-- DEEP SCAN SCREEN -->
    <div id="deepScreen" class="screen hidden">
      <h2>Full Survivor Scan</h2>
      <p class="subtitle">Optional advanced nonsense.</p>

      <label for="survivorName">Survivor name</label>
      <input id="survivorName" type="text" placeholder="Enter name or nickname" maxlength="24" />

      <label>Choose your survival path</label>
      <div class="path-grid" id="pathGrid"></div>

      <button class="main-button" onclick="generateProfile()">GENERATE PROFILE</button>
      <button class="secondary-button" onclick="randomPath()">PICK FOR ME</button>
      <button class="secondary-button" onclick="showCover()">BACK TO SIMPLE SCAN</button>

      <div id="profileResult" class="result-card"></div>
    </div>

  </div>

  <script>
    const coverTitles = [
      "YOU LIVED",
      "BARELY ALIVE",
      "MOSTLY HUMAN",
      "ZOMBIE CONFUSED",
      "BASSPROOF",
      "SUSPICIOUSLY FINE",
      "FERAL BUT FUNCTIONAL",
      "SURVIVOR-ish",
      "NOT DEAD YET",
      "VIBES DETECTED"
    ];

    const coverVerdicts = [
      "You survived the apocalypse, but only because the zombies got distracted by the bass.",
      "You are not infected. You are just overstimulated and making brave choices.",
      "The scanner cannot explain how you survived. It recommends not questioning it.",
      "You are cleared for the wasteland. Please hydrate before making eye contact with strangers.",
      "The zombies voted to leave you alone. They said your vibes were too confusing.",
      "You survived, but your sleep schedule did not.",
      "You are apocalypse-ready, assuming the apocalypse has food trucks and loud music.",
      "Survival confirmed. Dignity status still pending.",
      "You have been classified as mostly safe, mildly feral, and dangerously approachable.",
      "You made it through the blast zone with only minor emotional damage."
    ];

    const hydrationLevels = [
      "Suspicious",
      "Low",
      "Questionable",
      "Needs Water",
      "Vibes Only",
      "Barely Legal",
      "Surprisingly OK",
      "Electrolytes Needed",
      "Ask Later",
      "Not Great"
    ];

    const zombieRisks = [
      "Low",
      "Medium",
      "Confused",
      "They Fear You",
      "Too Loud",
      "Unclear",
      "Respectful Distance",
      "Emotionally Intimidated",
      "Distracted",
      "Manageable"
    ];

    const paths = [
      {
        name: "The Raver",
        desc: "Bass drops, kandi, optimism, and no idea what time it is.",
        ability: "Can locate any stage using only sub-bass vibrations.",
        weakness: "Forgets water exists until personally confronted.",
        item: "Emergency kandi bracelet"
      },
      {
        name: "The Loot Goblin",
        desc: "Somehow has snacks, stickers, and everyone else's charger.",
        ability: "Can find useful trash in any environment.",
        weakness: "Cannot walk past a free trinket.",
        item: "Suspiciously full pocket"
      },
      {
        name: "The Tank",
        desc: "Slow, durable, and impossible to move once planted.",
        ability: "Can stand in one spot for six hours.",
        weakness: "Turns like a forklift in crowds.",
        item: "Industrial emotional armor"
      },
      {
        name: "The Runner",
        desc: "Fast, panicked, and already three stages away.",
        ability: "Escapes danger before noticing it.",
        weakness: "Impossible to keep in one place.",
        item: "One heroic shoe"
      },
      {
        name: "The Medic",
        desc: "Carries water, gum, bandages, and everyone else's bad decisions.",
        ability: "Can revive friends with electrolytes and disappointment.",
        weakness: "Attracts helpless people.",
        item: "Overprepared mini kit"
      },
      {
        name: "The Chaos Gremlin",
        desc: "No map. No plan. No fear. Somehow thriving.",
        ability: "Turns bad ideas into side quests.",
        weakness: "Should not be left near buttons.",
        item: "Mystery wristband"
      },
      {
        name: "The Bass Monk",
        desc: "Calm in the crowd and spiritually aligned with the subwoofer.",
        ability: "Can meditate through a rail-shaking drop.",
        weakness: "Speaks in riddles after 1 AM.",
        item: "Sacred earplugs"
      },
      {
        name: "The Side Quest NPC",
        desc: "Appears suddenly, gives advice, disappears forever.",
        ability: "Can improve someone's night with one sentence.",
        weakness: "No one knows where they came from.",
        item: "Map fragment"
      }
    ];

    const titles = [
      "Bass Wasteland Wanderer",
      "Certified Zombie Distraction",
      "Hydration Liability",
      "Queen Mary Escapee",
      "Emergency Kandi Diplomat",
      "Professional Vibe Responder",
      "Survivor #404",
      "Minister of Bad Ideas",
      "The Final Goblin",
      "Lord of Lost Charging Cables",
      "Captain of the Bass Zone",
      "Certified Crowd Cryptid",
      "The Unreasonably Durable One",
      "Apocalypse Vibe Inspector",
      "The Walking Side Quest"
    ];

    const finalDiagnoses = [
      "Survived the apocalypse, but lost three friends, two brain cells, and one charging cable.",
      "Cleared for survival with a strong recommendation to drink water.",
      "Likely to survive because nobody can predict what you are doing.",
      "Dangerous in groups, powerful alone, unstoppable near loud speakers.",
      "The wasteland accepts you, but your knees have filed a complaint.",
      "Not the main character, but absolutely in the weirdest subplot.",
      "Survival chance increased by confidence. Decreased by common sense.",
      "Fit for apocalypse travel, provided someone else remembers where the car is."
    ];

    const badges = [
      "Bassproof",
      "Mildly Haunted",
      "Snack Motivated",
      "Crowd Certified",
      "Zombie Tolerant",
      "Hydration Pending",
      "Side Quest Ready",
      "Chaos Approved",
      "Low Battery Legend",
      "Kandi Diplomat",
      "Festival Feral",
      "Map Optional"
    ];

    let selectedPathIndex = null;

    function randomFrom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function randomNumber(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeStat(label, value) {
      return `<div class="stat"><span>${label}</span><span>${value}</span></div>`;
    }

    function rerollCover() {
      document.getElementById("coverTitle").textContent = randomFrom(coverTitles);
      document.getElementById("coverVerdict").textContent = randomFrom(coverVerdicts);
      document.getElementById("bassStat").textContent = randomNumber(54, 99) + "%";
      document.getElementById("hydrationStat").textContent = randomFrom(hydrationLevels);
      document.getElementById("zombieStat").textContent = randomFrom(zombieRisks);
    }

    function showDeepScan() {
      document.getElementById("coverScreen").classList.add("hidden");
      document.getElementById("deepScreen").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showCover() {
      document.getElementById("deepScreen").classList.add("hidden");
      document.getElementById("coverScreen").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderPaths() {
      const pathGrid = document.getElementById("pathGrid");
      pathGrid.innerHTML = "";

      paths.forEach((path, index) => {
        const button = document.createElement("button");
        button.className = "path-button";
        button.innerHTML = `
          <span class="path-name">${path.name}</span>
          <span class="path-desc">${path.desc}</span>
        `;

        button.onclick = () => {
          selectedPathIndex = index;
          document.querySelectorAll(".path-button").forEach(btn => btn.classList.remove("selected"));
          button.classList.add("selected");
        };

        pathGrid.appendChild(button);
      });
    }

    function randomPath() {
      selectedPathIndex = randomNumber(0, paths.length - 1);
      document.querySelectorAll(".path-button").forEach((btn, index) => {
        btn.classList.toggle("selected", index === selectedPathIndex);
      });
    }

    function generateProfile() {
      const nameInput = document.getElementById("survivorName").value.trim();
      const survivorName = nameInput || randomFrom([
        "Unknown Entity",
        "Mystery Goblin",
        "Bass Creature",
        "Lost Festival Person",
        "Suspicious Human",
        "Wandering Rando"
      ]);

      if (selectedPathIndex === null) {
        randomPath();
      }

      const path = paths[selectedPathIndex];

      const pickedBadges = [];
      while (pickedBadges.length < 3) {
        const badge = randomFrom(badges);
        if (!pickedBadges.includes(badge)) {
          pickedBadges.push(badge);
        }
      }

      const rareEvent = Math.random() < 0.12
        ? `<div class="profile-text"><strong>RARE EVENT:</strong><br>The zombies have accepted you as one of their emotionally complicated leaders.</div>`
        : "";

      document.getElementById("profileResult").style.display = "block";
      document.getElementById("profileResult").innerHTML = `
        <h2 class="glitch">PROFILE READY</h2>

        ${makeStat("Name", survivorName)}
        ${makeStat("Title", randomFrom(titles))}
        ${makeStat("Path", path.name)}
        ${makeStat("Survival Chance", randomNumber(45, 99) + "%")}
        ${makeStat("Zombie Bite Risk", randomNumber(1, 42) + "%")}
        ${makeStat("Dance Power", randomNumber(55, 100) + "%")}

        <div class="profile-text">
          <strong>Special Ability:</strong><br>${path.ability}<br><br>
          <strong>Weakness:</strong><br>${path.weakness}<br><br>
          <strong>Starting Item:</strong><br>${path.item}<br><br>
          <strong>Final Diagnosis:</strong><br>${randomFrom(finalDiagnoses)}
        </div>

        <div style="margin-top: 12px;">
          ${pickedBadges.map(badge => `<span class="badge">${badge}</span>`).join("")}
        </div>

        ${rareEvent}
      `;

      document.getElementById("profileResult").scrollIntoView({
        behavior: "smooth",
        block: "nearest"
      });
    }

    renderPaths();
    rerollCover();
  </script>
</body>
</html>
