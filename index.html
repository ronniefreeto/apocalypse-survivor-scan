<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apocalypse Survivor Scan</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Impact, Arial Black, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(137, 255, 0, 0.35), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 60, 0, 0.32), transparent 35%),
        radial-gradient(circle at center, rgba(80, 0, 120, 0.22), transparent 50%),
        #050605;
      color: #f5ffe8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 560px;
      min-height: 94vh;
      border: 3px solid #9dff00;
      border-radius: 26px;
      background:
        linear-gradient(160deg, rgba(10, 18, 8, 0.96), rgba(20, 8, 8, 0.96)),
        #070707;
      box-shadow:
        0 0 28px rgba(157, 255, 0, 0.35),
        inset 0 0 24px rgba(157, 255, 0, 0.08);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 12%, rgba(157, 255, 0, 0.18) 0 7%, transparent 8%),
        radial-gradient(circle at 85% 24%, rgba(255, 80, 0, 0.16) 0 8%, transparent 9%),
        radial-gradient(circle at 70% 84%, rgba(157, 255, 0, 0.12) 0 10%, transparent 11%),
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.035),
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 8px
        );
      pointer-events: none;
      opacity: 0.9;
    }

    .slime {
      position: absolute;
      width: 90px;
      height: 160px;
      background: #9dff00;
      opacity: 0.28;
      border-radius: 0 0 45px 45px;
      filter: blur(0.2px);
      top: -30px;
      z-index: 0;
    }

    .slime.one {
      left: 12%;
      height: 120px;
    }

    .slime.two {
      left: 48%;
      height: 180px;
      width: 60px;
      opacity: 0.22;
    }

    .slime.three {
      right: 9%;
      height: 95px;
      width: 75px;
      opacity: 0.25;
    }

    .screen {
      position: relative;
      z-index: 2;
      min-height: 88vh;
    }

    .hidden {
      display: none;
    }

    h1 {
      margin: 0;
      text-align: center;
      color: #9dff00;
      font-size: clamp(3.4rem, 14vw, 5.4rem);
      line-height: 0.85;
      letter-spacing: 1px;
      text-shadow:
        4px 4px 0 #2c4700,
        0 0 18px rgba(157, 255, 0, 0.8);
      text-transform: uppercase;
    }

    h2 {
      margin: 0 0 14px;
      text-align: center;
      color: #9dff00;
      font-size: clamp(2.5rem, 10vw, 4rem);
      line-height: 0.95;
      text-shadow:
        3px 3px 0 #2c4700,
        0 0 16px rgba(157, 255, 0, 0.7);
      text-transform: uppercase;
    }

    .subtitle {
      text-align: center;
      color: #f4ffd5;
      font-family: Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(1.55rem, 6vw, 2.2rem);
      margin: 18px 0 22px;
      line-height: 1.15;
      text-transform: uppercase;
    }

    .big-card {
      border: 3px solid rgba(157, 255, 0, 0.85);
      border-radius: 24px;
      padding: 20px;
      background:
        radial-gradient(circle at top, rgba(157, 255, 0, 0.22), transparent 45%),
        rgba(10, 30, 8, 0.86);
      margin: 20px 0;
      text-align: center;
      box-shadow: 0 0 20px rgba(157, 255, 0, 0.24);
    }

    .scan-label {
      color: #ff6b00;
      font-size: clamp(1.7rem, 7vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-shadow: 2px 2px 0 #3b1300;
      text-transform: uppercase;
    }

    .big-result {
      font-size: clamp(3.2rem, 13vw, 5.2rem);
      color: #ffffff;
      font-weight: 900;
      line-height: 0.9;
      margin-bottom: 18px;
      text-shadow:
        4px 4px 0 #182500,
        0 0 16px rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
    }

    .verdict {
      font-family: Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(1.55rem, 6vw, 2.25rem);
      line-height: 1.15;
      color: #f5ffe8;
    }

    .quick-stats {
      display: grid;
      gap: 12px;
      margin: 20px 0;
    }

    .quick-stat {
      border: 2px solid rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.07);
      font-size: clamp(1.35rem, 5.5vw, 2rem);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-family: Arial, sans-serif;
      font-weight: 900;
    }

    .quick-stat span:first-child {
      color: #d5ffaa;
    }

    .quick-stat span:last-child {
      color: #ffffff;
      text-align: right;
    }

    button {
      font-family: Impact, Arial Black, Arial, sans-serif;
      text-transform: uppercase;
    }

    .monster-button {
      width: 100%;
      min-height: 20vh;
      padding: 20px;
      border-radius: 24px;
      border: none;
      background:
        linear-gradient(135deg, #9dff00, #fff200, #ff6b00);
      color: #071000;
      font-size: clamp(2.4rem, 10vw, 4.2rem);
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 0 24px rgba(157, 255, 0, 0.55),
        0 8px 0 #385500;
      margin-top: 18px;
      line-height: 0.95;
    }

    .monster-button:active,
    .main-button:active,
    .secondary-button:active,
    .path-button:active {
      transform: scale(0.98);
      box-shadow: 0 0 12px rgba(157, 255, 0, 0.35);
    }

    .secondary-button {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: 2px solid #9dff00;
      background: #111;
      color: #f5ffe8;
      font-size: clamp(1.35rem, 5vw, 2rem);
      cursor: pointer;
      margin-top: 12px;
    }

    .main-button {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, #9dff00, #fff200);
      color: #071000;
      font-size: clamp(1.7rem, 7vw, 2.7rem);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(157, 255, 0, 0.4);
      margin-top: 14px;
    }

    label {
      display: block;
      margin: 18px 0 10px;
      color: #f5ffe8;
      font-family: Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(1.35rem, 5vw, 1.8rem);
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: 3px solid #9dff00;
      background: #101510;
      color: #fff;
      font-size: clamp(1.5rem, 6vw, 2.1rem);
      outline: none;
      font-weight: 900;
    }

    .path-grid {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .path-button {
      width: 100%;
      text-align: left;
      padding: 18px;
      border-radius: 18px;
      border: 2px solid rgba(157, 255, 0, 0.65);
      background:
        linear-gradient(135deg, rgba(157, 255, 0, 0.12), rgba(255, 90, 0, 0.08));
      color: #f2f2f2;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .path-button.selected {
      border-color: #fff200;
      box-shadow: 0 0 18px rgba(255, 242, 0, 0.35);
      background: rgba(255, 242, 0, 0.16);
    }

    .path-name {
      display: block;
      color: #fff200;
      font-weight: 900;
      font-size: clamp(1.55rem, 6vw, 2.15rem);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .path-desc {
      display: block;
      color: #f5ffe8;
      line-height: 1.25;
      font-size: clamp(1.05rem, 4.2vw, 1.4rem);
      font-weight: 800;
    }

    .profile-card {
      border: 4px solid #9dff00;
      border-radius: 28px;
      padding: 22px;
      background:
        radial-gradient(circle at top, rgba(157, 255, 0, 0.2), transparent 42%),
        radial-gradient(circle at bottom right, rgba(255, 90, 0, 0.16), transparent 42%),
        rgba(8, 14, 8, 0.94);
      box-shadow:
        0 0 26px rgba(157, 255, 0, 0.35),
        inset 0 0 20px rgba(157, 255, 0, 0.08);
      min-height: 82vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .profile-top {
      text-align: center;
    }

    .profile-label {
      color: #ff6b00;
      font-size: clamp(1.45rem, 5vw, 2rem);
      text-shadow: 2px 2px 0 #3b1300;
      text-transform: uppercase;
    }

    .profile-name {
      color: #ffffff;
      font-size: clamp(3rem, 12vw, 5rem);
      line-height: 0.9;
      margin: 8px 0 12px;
      text-shadow:
        4px 4px 0 #273b00,
        0 0 15px rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      word-break: break-word;
    }

    .profile-title {
      color: #fff200;
      font-size: clamp(1.8rem, 7vw, 3rem);
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 #3b3500;
    }

    .profile-stats {
      display: grid;
      gap: 10px;
      margin: 18px 0;
      font-family: Arial, sans-serif;
      font-weight: 900;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 2px dashed rgba(255, 255, 255, 0.2);
      padding: 10px 0;
      font-size: clamp(1.1rem, 4.6vw, 1.55rem);
    }

    .stat span:first-child {
      color: #d5ffaa;
    }

    .stat span:last-child {
      color: #ffffff;
      text-align: right;
    }

    .profile-text {
      margin-top: 12px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(157, 255, 0, 0.1);
      border: 2px solid rgba(157, 255, 0, 0.45);
      font-family: Arial, sans-serif;
      font-size: clamp(1.05rem, 4.2vw, 1.45rem);
      line-height: 1.3;
      font-weight: 900;
    }

    .badges {
      margin-top: 14px;
    }

    .badge {
      display: inline-block;
      margin: 6px 5px 0 0;
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(255, 242, 0, 0.14);
      border: 2px solid rgba(255, 242, 0, 0.5);
      color: #fff8b0;
      font-family: Arial, sans-serif;
      font-size: clamp(0.95rem, 3.8vw, 1.2rem);
      font-weight: 900;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: #d5ffaa;
      font-family: Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(1rem, 4vw, 1.25rem);
      line-height: 1.25;
    }

    .glitch {
      animation: glitch 1.4s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 4px 4px 0 #2c4700, 3px 0 #ff3b00, -3px 0 #00eaff; }
      25% { text-shadow: 4px 4px 0 #2c4700, -3px 0 #ff3b00, 3px 0 #00eaff; }
      50% { text-shadow: 4px 4px 0 #2c4700, 3px 0 #fff200, -3px 0 #9dff00; }
      75% { text-shadow: 4px 4px 0 #2c4700, -2px 0 #00eaff, 2px 0 #ff3b00; }
      100% { text-shadow: 4px 4px 0 #2c4700, 3px 0 #ff3b00, -3px 0 #00eaff; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="slime one"></div>
    <div class="slime two"></div>
    <div class="slime three"></div>

    <!-- PAGE 1: COVER SCAN -->
    <div id="coverScreen" class="screen">
      <h1 class="glitch">DID YOU SURVIVE?</h1>
      <p class="subtitle">Zombie bass scan complete.</p>

      <div class="big-card">
        <div class="scan-label">Final Verdict</div>
        <div id="coverTitle" class="big-result"></div>
        <div id="coverVerdict" class="verdict"></div>
      </div>

      <div class="quick-stats">
        <div class="quick-stat">
          <span>Bass</span>
          <span id="bassStat"></span>
        </div>
        <div class="quick-stat">
          <span>Hydration</span>
          <span id="hydrationStat"></span>
        </div>
        <div class="quick-stat">
          <span>Zombie Risk</span>
          <span id="zombieStat"></span>
        </div>
      </div>

      <button class="monster-button" onclick="showPathScreen()">CONTINUE SCAN</button>
      <button class="secondary-button" onclick="rerollCover()">SCAN AGAIN</button>

      <p class="footer-note">No reading required. The machine already judged you.</p>
    </div>

    <!-- PAGE 2: PATH SELECTION -->
    <div id="pathScreen" class="screen hidden">
      <h2 class="glitch">CHOOSE YOUR FATE</h2>
      <p class="subtitle">Name yourself. Pick a path. Or let chaos decide.</p>

      <label for="survivorName">Survivor Name</label>
      <input id="survivorName" type="text" placeholder="Name or nickname" maxlength="24" />

      <label>Survival Path</label>
      <div class="path-grid" id="pathGrid"></div>

      <button class="main-button" onclick="generateProfile()">MAKE MY PROFILE</button>
      <button class="secondary-button" onclick="randomPath()">PICK FOR ME</button>
      <button class="secondary-button" onclick="showCover()">BACK</button>
    </div>

    <!-- PAGE 3: SCREENSHOT PROFILE -->
    <div id="profileScreen" class="screen hidden">
      <div id="profileCard" class="profile-card"></div>

      <button class="main-button" onclick="generateProfile()">REROLL PROFILE</button>
      <button class="secondary-button" onclick="showPathScreen()">CHANGE PATH</button>
      <button class="secondary-button" onclick="showCover()">START OVER</button>

      <p class="footer-note">Screenshot your official apocalypse diagnosis.</p>
    </div>
  </div>

  <script>
    const coverTitles = [
      "YOU LIVED",
      "BARELY ALIVE",
      "MOSTLY HUMAN",
      "ZOMBIE CONFUSED",
      "BASSPROOF",
      "SUSPICIOUSLY FINE",
      "FERAL BUT FUNCTIONAL",
      "NOT DEAD YET",
      "VIBES DETECTED",
      "UNDEAD-ish"
    ];

    const coverVerdicts = [
      "Zombies got distracted by the bass.",
      "Not infected. Just overstimulated.",
      "Survival confirmed. Dignity pending.",
      "The scanner recommends water.",
      "The zombies fear your vibe.",
      "You lived. Your sleep schedule did not.",
      "Cleared for the wasteland.",
      "Too feral to eliminate.",
      "Mostly safe. Mildly haunted.",
      "The machine refuses to explain this."
    ];

    const hydrationLevels = [
      "Suspicious",
      "Low",
      "Needs Water",
      "Vibes Only",
      "Barely Legal",
      "Electrolytes",
      "Unclear",
      "Not Great"
    ];

    const zombieRisks = [
      "Low",
      "Medium",
      "Confused",
      "They Fear You",
      "Too Loud",
      "Unclear",
      "Distracted",
      "Manageable"
    ];

    const paths = [
      {
        name: "The Raver",
        desc: "Bass drops, kandi, optimism, no idea what time it is.",
        ability: "Can locate any stage using only sub-bass vibrations.",
        weakness: "Forgets water exists until personally confronted.",
        item: "Emergency kandi bracelet"
      },
      {
        name: "The Loot Goblin",
        desc: "Somehow has snacks, stickers, and everyone else's charger.",
        ability: "Can find useful trash in any environment.",
        weakness: "Cannot walk past a free trinket.",
        item: "Suspiciously full pocket"
      },
      {
        name: "The Tank",
        desc: "Slow, durable, and impossible to move once planted.",
        ability: "Can stand in one spot for six hours.",
        weakness: "Turns like a forklift in crowds.",
        item: "Industrial emotional armor"
      },
      {
        name: "The Runner",
        desc: "Fast, panicked, and already three stages away.",
        ability: "Escapes danger before noticing it.",
        weakness: "Impossible to keep in one place.",
        item: "One heroic shoe"
      },
      {
        name: "The Medic",
        desc: "Carries water, gum, bandages, and everyone else's bad decisions.",
        ability: "Can revive friends with electrolytes and disappointment.",
        weakness: "Attracts helpless people.",
        item: "Overprepared mini kit"
      },
      {
        name: "The Chaos Gremlin",
        desc: "No map. No plan. No fear. Somehow thriving.",
        ability: "Turns bad ideas into side quests.",
        weakness: "Should not be left near buttons.",
        item: "Mystery wristband"
      },
      {
        name: "The Bass Monk",
        desc: "Calm in the crowd. Spiritually aligned with the subwoofer.",
        ability: "Can meditate through a rail-shaking drop.",
        weakness: "Speaks in riddles after 1 AM.",
        item: "Sacred earplugs"
      },
      {
        name: "The Side Quest NPC",
        desc: "Appears suddenly, gives advice, disappears forever.",
        ability: "Can improve someone's night with one sentence.",
        weakness: "No one knows where they came from.",
        item: "Map fragment"
      }
    ];

    const titles = [
      "Bass Wasteland Wanderer",
      "Certified Zombie Distraction",
      "Hydration Liability",
      "Queen Mary Escapee",
      "Emergency Kandi Diplomat",
      "Professional Vibe Responder",
      "Survivor #404",
      "Minister of Bad Ideas",
      "The Final Goblin",
      "Lord of Lost Chargers",
      "Captain of the Bass Zone",
      "Certified Crowd Cryptid",
      "The Durable One",
      "Apocalypse Vibe Inspector",
      "The Walking Side Quest",
      "Wasteland Snack Baron",
      "Zombie Negotiator",
      "Slime Zone Survivor",
      "Rave Ruins Royalty",
      "Undead Bass Magnet"
    ];

    const finalDiagnoses = [
      "Survived the apocalypse, but lost two brain cells and one charging cable.",
      "Cleared for survival. Drink water immediately.",
      "Likely to survive because nobody can predict what you are doing.",
      "Dangerous in groups. Powerful alone. Unstoppable near speakers.",
      "The wasteland accepts you. Your knees do not.",
      "Not the main character, but definitely in the weirdest subplot.",
      "Confidence high. Common sense missing.",
      "Fit for apocalypse travel if someone else remembers where the car is.",
      "Too weird to bite. Zombies have moved on.",
      "Classified as alive, loud, and medically confusing."
    ];

    const badges = [
      "Bassproof",
      "Mildly Haunted",
      "Snack Motivated",
      "Crowd Certified",
      "Zombie Tolerant",
      "Hydration Pending",
      "Side Quest Ready",
      "Chaos Approved",
      "Low Battery Legend",
      "Kandi Diplomat",
      "Festival Feral",
      "Map Optional",
      "Slime Resistant",
      "Brain Cell Survivor",
      "Haunted Hallway Approved"
    ];

    let selectedPathIndex = null;

    function randomFrom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function randomNumber(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function showOnly(screenId) {
      document.getElementById("coverScreen").classList.add("hidden");
      document.getElementById("pathScreen").classList.add("hidden");
      document.getElementById("profileScreen").classList.add("hidden");
      document.getElementById(screenId).classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showCover() {
      showOnly("coverScreen");
    }

    function showPathScreen() {
      showOnly("pathScreen");
    }

    function showProfileScreen() {
      showOnly("profileScreen");
    }

    function rerollCover() {
      document.getElementById("coverTitle").textContent = randomFrom(coverTitles);
      document.getElementById("coverVerdict").textContent = randomFrom(coverVerdicts);
      document.getElementById("bassStat").textContent = randomNumber(54, 99) + "%";
      document.getElementById("hydrationStat").textContent = randomFrom(hydrationLevels);
      document.getElementById("zombieStat").textContent = randomFrom(zombieRisks);
    }

    function renderPaths() {
      const pathGrid = document.getElementById("pathGrid");
      pathGrid.innerHTML = "";

      paths.forEach((path, index) => {
        const button = document.createElement("button");
        button.className = "path-button";
        button.innerHTML = `
          <span class="path-name">${path.name}</span>
          <span class="path-desc">${path.desc}</span>
        `;

        button.onclick = () => {
          selectedPathIndex = index;
          document.querySelectorAll(".path-button").forEach(btn => btn.classList.remove("selected"));
          button.classList.add("selected");
        };

        pathGrid.appendChild(button);
      });
    }

    function randomPath() {
      selectedPathIndex = randomNumber(0, paths.length - 1);
      document.querySelectorAll(".path-button").forEach((btn, index) => {
        btn.classList.toggle("selected", index === selectedPathIndex);
      });
    }

    function statLine(label, value) {
      return `<div class="stat"><span>${label}</span><span>${value}</span></div>`;
    }

    function generateProfile() {
      const nameInput = document.getElementById("survivorName").value.trim();

      const survivorName = nameInput || randomFrom([
        "Unknown Entity",
        "Mystery Goblin",
        "Bass Creature",
        "Lost Festival Person",
        "Suspicious Human",
        "Wandering Rando",
        "Unregistered Lifeform",
        "Slime Witness"
      ]);

      if (selectedPathIndex === null) {
        randomPath();
      }

      const path = paths[selectedPathIndex];

      const pickedBadges = [];
      while (pickedBadges.length < 3) {
        const badge = randomFrom(badges);
        if (!pickedBadges.includes(badge)) {
          pickedBadges.push(badge);
        }
      }

      const rareEvent = Math.random() < 0.12
        ? `<div class="profile-text"><strong>RARE EVENT:</strong><br>The zombies have accepted you as one of their emotionally complicated leaders.</div>`
        : "";

      document.getElementById("profileCard").innerHTML = `
        <div class="profile-top">
          <div class="profile-label">Official Survivor Profile</div>
          <div class="profile-name">${survivorName}</div>
          <div class="profile-title">${randomFrom(titles)}</div>
        </div>

        <div class="profile-stats">
          ${statLine("Path", path.name)}
          ${statLine("Survival", randomNumber(45, 99) + "%")}
          ${statLine("Bite Risk", randomNumber(1, 42) + "%")}
          ${statLine("Dance Power", randomNumber(55, 100) + "%")}
        </div>

        <div class="profile-text">
          <strong>Ability:</strong><br>${path.ability}<br><br>
          <strong>Weakness:</strong><br>${path.weakness}<br><br>
          <strong>Item:</strong><br>${path.item}<br><br>
          <strong>Diagnosis:</strong><br>${randomFrom(finalDiagnoses)}
        </div>

        <div class="badges">
          ${pickedBadges.map(badge => `<span class="badge">${badge}</span>`).join("")}
        </div>

        ${rareEvent}
      `;

      showProfileScreen();
    }

    renderPaths();
    rerollCover();
  </script>
</body>
</html>
